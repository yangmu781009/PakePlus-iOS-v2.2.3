<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6ba995">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="逸百年康养">
    <title>逸百年康养美容客户管理系统</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #f5f5f5;
            padding: 10px;
        }
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }
        .header {
            text-align: center;
            padding: 15px 0;
            background: #6ba995;
            color: white;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .menu {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .menu button {
            flex: 1;
            min-width: 30%;
            padding: 10px;
            background: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            box-shadow: 0 2px 4px #00000015;
        }
        .menu button.active {
            background: #6ba995;
            color: white;
        }
        .form-box {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .form-box input, .form-box select, .form-box textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
        }
        .btn {
            background: #6ba995;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            width: 100%;
            font-size: 16px;
            margin-top: 5px;
        }
        .btn-red {
            background: #e65050;
        }
        .btn-blue {
            background: #4092e8;
        }
        .list-item {
            background: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
            border-left: 4px solid #6ba995;
        }
        .list-item .title {
            font-weight: bold;
            margin-bottom: 4px;
        }
        .list-item .info {
            color: #666;
            font-size: 13px;
            line-height: 1.4;
        }
        .tip {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        
        /* 登录页面样式 */
        .login-tab {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            font-size: 14px;
            color: #666;
            cursor: pointer;
        }
        
        .login-tab.active {
            color: #6ba995;
            border-bottom: 2px solid #6ba995;
        }
        
        .login-form {
            display: none;
        }
        
        .login-form.active {
            display: block;
        }
        /* 打印样式 */
        @media print {
            .menu, .header, .form-box, button { display: none !important; }
            .list-item { border: none; padding: 5px; }
        }
    </style>
</head>
<body>

<!-- 登录页面 -->
<div id="login" class="page active">
    <div class="form-box" style="max-width: 400px; margin: 50px auto;">
        <h3 style="text-align: center; color: #6ba995; margin-bottom: 30px;">🔐 系统登录</h3>
        
        <!-- 登录方式切换 -->
        <div style="display: flex; margin-bottom: 20px; border-bottom: 1px solid #ddd;">
            <button id="loginTab" class="login-tab active" onclick="switchLoginTab('login')">登录</button>
            <button id="registerTab" class="login-tab" onclick="switchLoginTab('register')">注册</button>
        </div>
        
        <!-- 密码登录 -->
        <div id="loginForm" class="login-form active">
            <input type="text" id="loginPhone" placeholder="手机号码或用户名" style="margin-bottom: 10px;">
            <input type="password" id="loginPassword" placeholder="登录密码" style="margin-bottom: 10px;">
            <button class="btn" onclick="loginWithPassword()" style="margin-bottom: 10px;">登录</button>
            <div style="text-align: right; font-size: 12px;">
                <a href="javascript:switchLoginTab('register')" style="color: #4092e8;">注册新账号</a>
            </div>
        </div>
        
        <!-- 注册 -->
        <div id="registerForm" class="login-form">
            <input type="text" id="registerPhone" placeholder="手机号码或用户名" style="margin-bottom: 10px;">
            <input type="password" id="registerPassword" placeholder="设置登录密码" style="margin-bottom: 10px;">
            <input type="password" id="registerConfirmPassword" placeholder="确认密码" style="margin-bottom: 10px;">
            <button class="btn" onclick="registerUser()" style="margin-bottom: 10px;">注册</button>
            <div style="text-align: center; font-size: 12px;">
                <a href="javascript:switchLoginTab('login')" style="color: #4092e8;">已有账号？去登录</a>
            </div>
        </div>
    </div>
</div>

<div class="header" style="display: none;">
    <h2>逸百年康养美容客户管理系统</h2>
    <div style="font-size: 12px; margin-top: 5px; cursor: pointer;" onclick="logout()">退出登录</div>
</div>

<div class="menu" style="display: none;">
    <button onclick="goPage('home')">首页</button>
    <button onclick="goPage('customer')">客户管理</button>
    <button onclick="goPage('card')">客户开卡</button>
    <button onclick="goPage('checkin')">客户打卡</button>
    <button onclick="goPage('cancel')">销卡办理</button>
    <button onclick="goPage('employee')">员工管理</button>
    <button onclick="goPage('data')">数据中心</button>
    <button onclick="goPage('expense')">支出管理</button>
</div>

<!-- 首页 -->
<div id="home" class="page">
    <div class="form-box">
        <h3>📊 快捷操作</h3>
        <button class="btn" onclick="goPage('customer')">客户登记</button>
        <button class="btn" onclick="goPage('card')">客户开卡</button>
        <button class="btn" onclick="goPage('checkin')">客户打卡</button>
        <button class="btn" onclick="goPage('cancel')">销卡办理</button>
        <button class="btn" onclick="goPage('employee')">员工管理</button>
        <button class="btn" onclick="goPage('data')">数据中心</button>
        <button class="btn" onclick="goPage('expense')">支出管理</button>
    </div>
</div>

<!-- 客户管理 -->
<div id="customer" class="page">
    <div class="form-box">
        <h3>👤 客户登记</h3>
        <input id="c_name" type="text" placeholder="客户姓名">
        <input id="c_tel" type="text" placeholder="联系电话">
        <input id="c_age" type="number" placeholder="年龄">
        <input id="c_birthday" type="date" placeholder="生日">
        <input id="c_address" type="text" placeholder="家庭住址">
        <input id="c_wechat" type="text" placeholder="客户微信">
        <input id="c_remark" type="text" placeholder="备注（需求/其他）">
        <button class="btn" onclick="saveCustomer()">保存客户</button>
    </div>
    <div class="form-box">
        <h3>🔍 客户搜索</h3>
        <input id="search_customer" type="text" placeholder="输入姓名或电话搜索" onkeyup="searchCustomer()">
    </div>
    <div id="customerList"></div>
</div>

<!-- 客户开卡 -->
<div id="card" class="page">
    <div class="form-box">
        <h3>💳 客户开卡</h3>
        <select id="card_name">
            <option value="">请选择客户</option>
        </select>
        <div style="display: flex; gap: 10px; align-items: center;">
            <select id="card_type" style="flex: 1;">
                <option>康养卡</option>
                <option>美容卡</option>
                <option>综合卡</option>
                <option>体验卡</option>
                <option>次卡</option>
                <option>季卡</option>
                <option>年卡</option>
            </select>
            <button type="button" onclick="openCardTypeSettings()" style="padding: 10px 15px; background: #4092e8; color: white; border: none; border-radius: 6px; cursor: pointer;">⚙️ 设置</button>
        </div>
        <input id="card_price" type="number" placeholder="卡金额">
        <input id="card_times" type="number" placeholder="总次数">
        <input id="card_date" type="date" placeholder="开卡日期">

        <!-- 👇 客户手写签名区域 -->
        <div style="margin-top: 10px;">
            <p style="font-size: 14px; color: #666; margin-bottom: 5px;">客户签名确认：</p>
            <canvas id="card_sign" width="400" height="150" style="border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: crosshair;"></canvas>
            <button type="button" onclick="clearCardSignature()" style="margin-top: 5px; padding: 5px 10px; font-size: 12px; background: #e65050; color: white; border: none; border-radius: 4px;">清除签名</button>
        </div>

        <!-- 👇 员工选择器 -->
        <div style="margin-top: 10px;">
            <p style="font-size: 14px; color: #666; margin-bottom: 5px;">员工签字确认：</p>
            <select id="staff_sign" style="width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 15px;">
                <option value="">请选择员工</option>
            </select>
        </div>

        <button class="btn" onclick="saveCard()">确认开卡</button>
        <button class="btn btn-blue" onclick="printCardList()">打印开卡记录</button>
    </div>
    <div id="cardList"></div>
</div>

<!-- 卡类型设置弹窗 -->
<div id="cardTypeModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 400px;">
        <h3 style="margin-top: 0; color: #6ba995;">⚙️ 卡类型设置</h3>
        <div style="margin: 15px 0;">
            <input id="new_card_type" type="text" placeholder="输入新的卡类型" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px;">
            <button type="button" onclick="addCardType()" style="width: 100%; padding: 10px; background: #6ba995; color: white; border: none; border-radius: 6px; cursor: pointer;">添加卡类型</button>
        </div>
        <div style="max-height: 200px; overflow-y: auto;">
            <h4 style="margin-bottom: 10px;">现有卡类型：</h4>
            <div id="cardTypeList" style="display: flex; flex-wrap: wrap; gap: 10px;"></div>
        </div>
        <button type="button" onclick="closeCardTypeModal()" style="margin-top: 15px; padding: 10px 20px; background: #e65050; color: white; border: none; border-radius: 6px; cursor: pointer;">关闭</button>
    </div>
</div>

<!-- 客户打卡 -->
<div id="checkin" class="page">
    <div class="form-box">
        <h3>✅ 客户打卡（自动扣次）</h3>

        <!-- 👇 客户姓名改为下拉选择器，自动加载已开卡客户 -->
        <select id="in_name" onchange="selectCustomer()">
            <option value="">请选择客户</option>
        </select>

        <!-- 👇 客户的所有卡项目选择器 -->
        <select id="in_card" onchange="selectCard()">
            <option value="">请选择卡项目</option>
        </select>

        <!-- 👇 自动显示卡类型 -->
        <input id="show_type" type="text" placeholder="卡类型" disabled>

        <!-- 👇 自动显示剩余次数 -->
        <input id="show_remain" type="text" placeholder="剩余次数" disabled>

        <!-- 👇 服务技师改为下拉选择器 -->
        <select id="in_tech">
            <option value="">请选择服务技师</option>
        </select>

        <!-- 👇 技师手工费选择器 -->
        <select id="in_tech_fee" style="margin-bottom: 10px;">
            <option value="0">请选择技师手工费</option>
            <option value="10">10元</option>
            <option value="15">15元</option>
            <option value="20">20元</option>
            <option value="25">25元</option>
            <option value="30">30元</option>
            <option value="35">35元</option>
            <option value="40">40元</option>
            <option value="45">45元</option>
            <option value="50">50元</option>
            <option value="55">55元</option>
            <option value="60">60元</option>
            <option value="65">65元</option>
            <option value="70">70元</option>
            <option value="75">75元</option>
            <option value="80">80元</option>
            <option value="85">85元</option>
            <option value="90">90元</option>
            <option value="95">95元</option>
            <option value="100">100元</option>
        </select>

        <textarea id="in_remark" placeholder="服务内容/身体情况"></textarea>

        <!-- 👇 客户手写签名区域 -->
        <div style="margin-top: 10px;">
            <p style="font-size: 14px; color: #666; margin-bottom: 5px;">客户签名：</p>
            <canvas id="signature" width="400" height="150" style="border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: crosshair;"></canvas>
            <button type="button" onclick="clearSignature()" style="margin-top: 5px; padding: 5px 10px; font-size: 12px; background: #e65050; color: white; border: none; border-radius: 4px;">清除签名</button>
        </div>

        <button class="btn" onclick="saveCheckin()">确认打卡（扣1次）</button>
        <button class="btn btn-blue" onclick="printCheckinList()">打印打卡记录</button>
    </div>
    <h3 style="margin:10px 0;color:#333;">📋 打卡记录列表</h3>
    <div id="checkinList"></div>
</div>

<!-- 销卡办理 -->
<div id="cancel" class="page">
    <div class="form-box">
        <h3>🗑️ 销卡办理（注销/退款）</h3>
        <!-- 👇 客户姓名选择器 -->
        <select id="cancel_name" onchange="selectCancelCustomer()" style="width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 15px;">
            <option value="">请选择客户</option>
        </select>
        <!-- 👇 卡类型选择器 -->
        <select id="cancel_card_type" style="width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 15px;">
            <option value="">请选择卡类型</option>
        </select>
        <!-- 👇 销卡原因选择器 -->
        <select id="cancel_reason" style="width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 15px;">
            <option value="">请选择销卡原因</option>
            <option value="自愿">自愿</option>
            <option value="到期">到期</option>
            <option value="退款">退款</option>
        </select>
        <input id="cancel_refund" type="number" placeholder="退款金额（无则填0）">
        <!-- 👇 客户手写签名区域 -->
        <div style="margin-top: 10px;">
            <p style="font-size: 14px; color: #666; margin-bottom: 5px;">客户签字确认：</p>
            <canvas id="cancel_sign" width="400" height="150" style="border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: crosshair;"></canvas>
            <button type="button" onclick="clearCancelSignature()" style="margin-top: 5px; padding: 5px 10px; font-size: 12px; background: #e65050; color: white; border: none; border-radius: 4px;">清除签名</button>
        </div>
        <button class="btn btn-red" onclick="saveCancel()">确认销卡</button>
        <button class="btn btn-blue" onclick="printCancelList()">打印销卡记录</button>
    </div>
    <div id="cancelList"></div>
</div>

<!-- 数据中心 -->
<div id="data" class="page">
    <div class="form-box">
        <h3>📊 数据中心</h3>
        <div id="dataStats"></div>
    </div>
    <div class="form-box">
        <h3>📈 打卡趋势（近7天）</h3>
        <div id="checkinTrend" style="display:flex;align-items:flex-end;height:150px;gap:10px;padding:10px 0;"></div>
    </div>
    <div class="form-box">
        <h3>🗄️ 数据管理</h3>
        <button class="btn btn-red" onclick="clearAllData()">清空所有数据</button>
        <button class="btn btn-blue" onclick="exportData()">导出数据备份</button>
        <button class="btn" onclick="importData()">导入数据备份</button>
        <input type="file" id="importFile" accept=".json" style="display:none;" onchange="handleImportFile(event)">
    </div>
</div>

<!-- 支出管理 -->
<div id="expense" class="page">
    <div class="form-box">
        <h3>💰 支出管理</h3>
        <input id="expense_date" type="date" placeholder="支出日期" style="margin-bottom: 10px;">
        <select id="expense_category" style="margin-bottom: 10px;">
            <option value="">请选择支出类别</option>
            <option value="工资">工资</option>
            <option value="房租">房租</option>
            <option value="水电费">水电费</option>
            <option value="材料费">材料费</option>
            <option value="设备费">设备费</option>
            <option value="宣传费">宣传费</option>
            <option value="其他">其他</option>
        </select>
        <input id="expense_amount" type="number" placeholder="支出金额" min="0" step="0.01" style="margin-bottom: 10px;">
        <input id="expense_desc" type="text" placeholder="支出描述" style="margin-bottom: 10px;">
        <button class="btn" onclick="addExpense()">添加支出</button>
    </div>
    <div class="form-box">
        <h3>📋 支出记录</h3>
        <div id="expenseList"></div>
    </div>
</div>

<!-- 员工管理 -->
<div id="employee" class="page">
    <div class="form-box">
        <h3>👥 员工管理</h3>
        <input id="e_name" type="text" placeholder="员工姓名">
        <input id="e_position" type="text" placeholder="职位">
        <input id="e_tel" type="text" placeholder="联系电话">
        <input id="e_remark" type="text" placeholder="备注">
        <button class="btn" onclick="saveEmployee()">保存员工</button>
    </div>
    <div id="employeeList"></div>
</div>

<script>
// 注册Service Worker
if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
        navigator.serviceWorker.register('./service-worker.js')
            .then(function(registration) {
                console.log('Service Worker 注册成功:', registration.scope);
            })
            .catch(function(error) {
                console.log('Service Worker 注册失败:', error);
            });
    });
}

// Firebase 配置
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
    appId: "YOUR_APP_ID",
    databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com"
};

// 初始化 Firebase
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// 本地数据
// 初始化数据缓存
let dataCache = {
    customers: JSON.parse(localStorage.getItem('yibainian_customers')) || [],
    cards: JSON.parse(localStorage.getItem('yibainian_cards')) || [],
    checkins: JSON.parse(localStorage.getItem('yibainian_checkins')) || [],
    cancels: JSON.parse(localStorage.getItem('yibainian_cancels')) || [],
    employees: JSON.parse(localStorage.getItem('yibainian_employees')) || [],
    expenses: JSON.parse(localStorage.getItem('yibainian_expenses')) || []
};

// 数据操作函数
function saveData() {
    // 保存到本地存储
    localStorage.setItem('yibainian_customers', JSON.stringify(dataCache.customers));
    localStorage.setItem('yibainian_cards', JSON.stringify(dataCache.cards));
    localStorage.setItem('yibainian_checkins', JSON.stringify(dataCache.checkins));
    localStorage.setItem('yibainian_cancels', JSON.stringify(dataCache.cancels));
    localStorage.setItem('yibainian_employees', JSON.stringify(dataCache.employees));
    localStorage.setItem('yibainian_expenses', JSON.stringify(dataCache.expenses));
    
    // 保存到Firebase数据库
    database.ref('data').set({
        customers: dataCache.customers,
        cards: dataCache.cards,
        checkins: dataCache.checkins,
        cancels: dataCache.cancels,
        employees: dataCache.employees,
        expenses: dataCache.expenses,
        lastUpdated: new Date().toISOString()
    }).catch(error => {
        console.error('Firebase 保存失败:', error);
    });
}

// 为了兼容现有代码，创建别名
let customers = dataCache.customers;
let cards = dataCache.cards;
let checkins = dataCache.checkins;
let cancels = dataCache.cancels;
let packages = dataCache.employees;
let expenses = dataCache.expenses;

// 从Firebase加载数据
function loadDataFromFirebase() {
    database.ref('data').once('value', snapshot => {
        const data = snapshot.val();
        if (data) {
            // 更新数据缓存
            dataCache.customers = data.customers || [];
            dataCache.cards = data.cards || [];
            dataCache.checkins = data.checkins || [];
            dataCache.cancels = data.cancels || [];
            dataCache.employees = data.employees || [];
            dataCache.expenses = data.expenses || [];
            
            // 更新别名
            customers = dataCache.customers;
            cards = dataCache.cards;
            checkins = dataCache.checkins;
            cancels = dataCache.cancels;
            packages = dataCache.employees;
            expenses = dataCache.expenses;
            
            // 更新本地存储
            saveData();
            
            // 重新渲染所有列表
            renderCardList();
            renderCheckinList();
            renderCancelList();
            renderEmployeeList();
            renderExpenseList();
            renderDataCenter();
            
            console.log('数据从Firebase加载成功');
        }
    }).catch(error => {
        console.error('Firebase 加载失败:', error);
    });
}

// 设置Firebase数据实时监听
function setupFirebaseListener() {
    database.ref('data').on('value', snapshot => {
        const data = snapshot.val();
        if (data) {
            // 检查数据是否有变化
            const currentData = JSON.stringify(dataCache);
            const newData = JSON.stringify({
                customers: data.customers || [],
                cards: data.cards || [],
                checkins: data.checkins || [],
                cancels: data.cancels || [],
                employees: data.employees || [],
                expenses: data.expenses || []
            });
            
            if (currentData !== newData) {
                // 更新数据缓存
                dataCache.customers = data.customers || [];
                dataCache.cards = data.cards || [];
                dataCache.checkins = data.checkins || [];
                dataCache.cancels = data.cancels || [];
                dataCache.employees = data.employees || [];
                dataCache.expenses = data.expenses || [];
                
                // 更新别名
                customers = dataCache.customers;
                cards = dataCache.cards;
                checkins = dataCache.checkins;
                cancels = dataCache.cancels;
                packages = dataCache.employees;
                expenses = dataCache.expenses;
                
                // 更新本地存储
                saveData();
                
                // 重新渲染所有列表
                renderCardList();
                renderCheckinList();
                renderCancelList();
                renderEmployeeList();
                renderExpenseList();
                renderDataCenter();
                
                console.log('数据已从Firebase实时更新');
            }
        }
    });
}

// 签名Canvas初始化
let canvas, ctx, isDrawing = false, lastX = 0, lastY = 0;

function initCanvas() {
    canvas = document.getElementById('signature');
    if(!canvas) return;
    ctx = canvas.getContext('2d');
    
    // 设置Canvas尺寸
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    
    // 设置绘图样式
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // 鼠标事件
    canvas.addEventListener('mousedown', function(e) {
        isDrawing = true;
        let rect = canvas.getBoundingClientRect();
        lastX = e.clientX - rect.left;
        lastY = e.clientY - rect.top;
    });

    canvas.addEventListener('mousemove', function(e) {
        if(!isDrawing) return;
        let rect = canvas.getBoundingClientRect();
        let x = e.clientX - rect.left;
        let y = e.clientY - rect.top;
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(x, y);
        ctx.stroke();
        lastX = x;
        lastY = y;
    });

    canvas.addEventListener('mouseup', function() {
        isDrawing = false;
    });

    canvas.addEventListener('mouseout', function() {
        isDrawing = false;
    });
    
    // 触摸事件支持
    canvas.addEventListener('touchstart', function(e) {
        e.preventDefault();
        isDrawing = true;
        let rect = canvas.getBoundingClientRect();
        let touch = e.touches[0];
        lastX = touch.clientX - rect.left;
        lastY = touch.clientY - rect.top;
    });
    
    canvas.addEventListener('touchmove', function(e) {
        e.preventDefault();
        if(!isDrawing) return;
        let rect = canvas.getBoundingClientRect();
        let touch = e.touches[0];
        let x = touch.clientX - rect.left;
        let y = touch.clientY - rect.top;
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(x, y);
        ctx.stroke();
        lastX = x;
        lastY = y;
    });
    
    canvas.addEventListener('touchend', function(e) {
        e.preventDefault();
        isDrawing = false;
    });
    
    canvas.addEventListener('touchcancel', function(e) {
        e.preventDefault();
        isDrawing = false;
    });
}

function clearSignature() {
    if(ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// 编辑客户
function editCustomer(id) {
    let customer = customers.find(c => c.id === id);
    if(customer) {
        document.getElementById('c_name').value = customer.name;
        document.getElementById('c_tel').value = customer.tel;
        document.getElementById('c_age').value = customer.age || '';
        document.getElementById('c_birthday').value = customer.birthday || '';
        document.getElementById('c_address').value = customer.address || '';
        document.getElementById('c_wechat').value = customer.wechat || '';
        document.getElementById('c_remark').value = customer.remark || '';
        
        // 替换保存按钮为更新按钮
        let saveBtn = document.querySelector('#customer .btn');
        saveBtn.textContent = '更新客户';
        saveBtn.onclick = function() {
            updateCustomer(id);
        };
    }
}

// 更新客户
function updateCustomer(id) {
    let name = document.getElementById('c_name').value.trim();
    let tel = document.getElementById('c_tel').value.trim();
    let age = document.getElementById('c_age').value.trim();
    let birthday = document.getElementById('c_birthday').value;
    let address = document.getElementById('c_address').value.trim();
    let wechat = document.getElementById('c_wechat').value.trim();
    let remark = document.getElementById('c_remark').value.trim();
    
    if(!name) { alert('请输入客户姓名！'); return; }
    
    let index = customers.findIndex(c => c.id === id);
    if(index !== -1) {
        customers[index] = {
            ...customers[index],
            name, tel, age, birthday, address, wechat, remark
        };
        localStorage.setItem('yibainian_customers', JSON.stringify(customers));
        alert('客户更新成功！');
        
        // 恢复保存按钮
        let saveBtn = document.querySelector('#customer .btn');
        saveBtn.textContent = '保存客户';
        saveBtn.onclick = saveCustomer;
        
        document.getElementById('c_name').value = '';
        document.getElementById('c_tel').value = '';
        document.getElementById('c_age').value = '';
        document.getElementById('c_birthday').value = '';
        document.getElementById('c_address').value = '';
        document.getElementById('c_wechat').value = '';
        document.getElementById('c_remark').value = '';
        
        renderCustomerList();
    }
}

function deleteCustomer(id) {

        renderCustomerList();
        alert('客户删除成功！');
    }
}

// 客户开卡
function saveCard() {
    let name = document.getElementById('card_name').value.trim();
    let type = document.getElementById('card_type').value;
    let price = document.getElementById('card_price').value;
    let times = document.getElementById('card_times').value;
    let date = document.getElementById('card_date').value;
    let sign = cardCanvas ? cardCanvas.toDataURL() : '';
    let staffSign = document.getElementById('staff_sign').value.trim();
    let time = new Date().toLocaleString();
    
    if(!name || !times || !date || !sign || !staffSign) {
        alert('请填写完整信息：姓名、次数、日期、客户签名、员工签名！');
        return;
    }
    
    let card = {
        name, type, price,
        times:parseInt(times),
        remain:parseInt(times),
        date, sign, staffSign, time
    };
    
    cards.unshift(card);
    saveData();

    document.getElementById('card_price').value = '';
    document.getElementById('card_times').value = '';
    document.getElementById('card_date').value = '';

    renderCardList();
}

    let d = document.getElementById('cardList'); d.innerHTML = '';
    cards.forEach(i=>{

            <div class="title">${i.name} | ${i.type}</div>

// 打卡+扣次
function saveCheckin() {
    let name = document.getElementById('in_name').value;
    let cardIndex = document.getElementById('in_card').value;
    let tech = document.getElementById('in_tech').value;
    let techFee = parseInt(document.getElementById('in_tech_fee').value) || 0;
    let remark = document.getElementById('in_remark').value;
    let signatureData = canvas.toDataURL();

    if(!name) { alert('请选择客户！'); return; }
    if(!cardIndex) { alert('请选择卡项目！'); return; }

    let customerCards = cards.filter(c=>c.name===name);
    let selectedCard = customerCards[parseInt(cardIndex)];

    if(!selectedCard) { alert('未找到卡信息！'); return; }
    if(selectedCard.remain <= 0) { alert('次数已用完！'); return; }

    selectedCard.remain -= 1;

    let log = {
        name, type: selectedCard.type, tech, techFee, remark,
        remain: selectedCard.remain,
        time: new Date().toLocaleString(),
        signature: signatureData
    };
    checkins.unshift(log);
    saveData();

    alert('打卡成功！剩余：' + selectedCard.remain + '次');
    document.getElementById('in_name').value = '';
    document.getElementById('in_card').innerHTML = '<option value="">请选择卡项目</option>';
    document.getElementById('show_type').value = '';
    document.getElementById('show_remain').value = '';
    document.getElementById('in_tech').value = '';
    document.getElementById('in_tech_fee').value = '0';
    document.getElementById('in_remark').value = '';
    clearSignature();

    renderCheckinList();
    renderCardList();
}

function renderCheckinList() {
    let d = document.getElementById('checkinList'); d.innerHTML = '';
    checkins.forEach(i=>{
        d.innerHTML+=`<div class="list-item">
            <div class="title">${i.name} | ${i.type}</div>
            <div class="info">技师：${i.tech||'无'} ${i.techFee > 0 ? '| 手工费：'+i.techFee+'元' : ''} | 剩余：${i.remain}次<br>时间：${i.time}<br>备注：${i.remark||'无'}</div>
            ${i.signature ? `<div style="margin-top:5px;"><img src="${i.signature}" style="width:150px;height:50px;border:1px solid #ddd;border-radius:4px;"></div>` : ''}
        </div>`;
    });
}

// 销卡功能
function saveCancel() {
    let name = document.getElementById('cancel_name').value.trim();
    let cardType = document.getElementById('cancel_card_type').value;
    let reason = document.getElementById('cancel_reason').value;
    let refund = document.getElementById('cancel_refund').value;
    let sign = cancelCanvas ? cancelCanvas.toDataURL() : '';

    let find = cards.find(c=>c.name===name && c.type===cardType);
    if(find) { find.remain = 0; }
    
    let log = {name, cardType, reason, refund, sign, time:new Date().toLocaleString()};
    cancels.unshift(log);
    saveData();
    alert('销卡成功！客户已注销');
    document.getElementById('cancel_name').value = '';
    document.getElementById('cancel_card_type').value = '';
    document.getElementById('cancel_reason').value = '';
    document.getElementById('cancel_refund').value = '';
    clearCancelSignature();
    renderCancelList(); renderCardList();
}

// 计算卡销售统计（每日、每周、每月）
function calculateSalesStats() {
    let today = new Date();
    let todayStr = today.toLocaleDateString();
    
    // 计算本周开始日期
    let weekStart = new Date(today);
    weekStart.setDate(today.getDate() - today.getDay() + 1); // 本周一
    
    // 计算本月开始日期
    let monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
    
    let stats = {
        today: { count: 0, amount: 0 },
        week: { count: 0, amount: 0 },
        month: { count: 0, amount: 0 }
    };
    
    cards.forEach(card => {
        // 假设卡有创建时间，如果没有则使用当前时间
        let cardDate = new Date(card.createTime || new Date());
        let cardDateStr = cardDate.toLocaleDateString();
        
        // 计算卡的金额（假设卡有金额属性，如果没有则默认为0）
        let cardAmount = parseInt(card.price) || 0;
        
        // 今日销售
        if(cardDateStr === todayStr) {
            stats.today.count++;
            stats.today.amount += cardAmount;
        }
        
        // 本周销售
        if(cardDate >= weekStart) {
            stats.week.count++;
            stats.week.amount += cardAmount;
        }
        
        // 本月销售
        if(cardDate >= monthStart) {
            stats.month.count++;
            stats.month.amount += cardAmount;
        }
    });
    
    return stats;
}

// 计算支出统计（每日、每周、每月）
function calculateExpenseStats() {
    let today = new Date();
    let todayStr = today.toLocaleDateString();
    
    // 计算本周开始日期
    let weekStart = new Date(today);
    weekStart.setDate(today.getDate() - today.getDay() + 1); // 本周一
    
    // 计算本月开始日期
    let monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
    
    let stats = {
        today: { count: 0, amount: 0 },
        week: { count: 0, amount: 0 },
        month: { count: 0, amount: 0 },
        categories: {}
    };
    
    expenses.forEach(expense => {
        let expenseDate = new Date(expense.date || new Date());
        let expenseDateStr = expenseDate.toLocaleDateString();
        let expenseAmount = parseInt(expense.amount) || 0;
        let expenseCategory = expense.category || '其他';
        
        // 今日支出
        if(expenseDateStr === todayStr) {
            stats.today.count++;
            stats.today.amount += expenseAmount;
        }
        
        // 本周支出
        if(expenseDate >= weekStart) {
            stats.week.count++;
            stats.week.amount += expenseAmount;
        }
        
        // 本月支出
        if(expenseDate >= monthStart) {
            stats.month.count++;
            stats.month.amount += expenseAmount;
        }
        
        // 按类别统计
        if(!stats.categories[expenseCategory]) {
            stats.categories[expenseCategory] = 0;
        }
        stats.categories[expenseCategory] += expenseAmount;
    });
    
    return stats;
}

// 计算客户开卡和打卡统计
function calculateCustomerStats() {
    let customerStats = {};
    
    // 初始化客户统计
    customers.forEach(customer => {
        customerStats[customer.name] = {
            cardCount: 0,
            checkinCount: 0,
            totalAmount: 0
        };
    });
    
    // 统计开卡数量和金额
    cards.forEach(card => {
        if(customerStats[card.name]) {
            customerStats[card.name].cardCount++;
            customerStats[card.name].totalAmount += parseInt(card.price) || 0;
        }
    });
    
    // 统计打卡次数
    checkins.forEach(checkin => {
        if(customerStats[checkin.name]) {
            customerStats[checkin.name].checkinCount++;
        }
    });
    
    return customerStats;
}

        html += `
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;">
                <div style="background:#6ba995;width:100%;height:${height}px;border-radius:4px 4px 0 0;"></div>
                <div style="font-size:11px;margin-top:5px;color:#666;">${dateStr}</div>
                <div style="font-size:12px;font-weight:bold;color:#333;">${counts[index]}</div>
            </div>
        `;
    });
    container.innerHTML = html;
}

// 清空所有数据
function clearAllData() {
    if(confirm('确定要清空所有数据吗？此操作不可恢复！\n\n建议先导出数据备份！')) {
        localStorage.removeItem('yibainian_customers');
        localStorage.removeItem('yibainian_cards');
        localStorage.removeItem('yibainian_checkins');
        localStorage.removeItem('yibainian_cancels');
        localStorage.removeItem('yibainian_employees');
        localStorage.removeItem('yibainian_expenses');
        
        customers = [];
        cards = [];
        checkins = [];
        cancels = [];
        packages = [];
        expenses = [];
        
        renderCardList();
        renderCheckinList();
        renderCancelList();
        renderEmployeeList();
        renderExpenseList();
        renderDataCenter();

}

// 添加支出记录
function addExpense() {
    let date = document.getElementById('expense_date').value;
    let category = document.getElementById('expense_category').value;
    let amount = document.getElementById('expense_amount').value;
    let desc = document.getElementById('expense_desc').value;
    
    if(!date) {
        alert('请选择支出日期！');
        return;
    }
    
    if(!category) {
        alert('请选择支出类别！');
        return;
    }
    
    if(!amount || parseFloat(amount) <= 0) {
        alert('请输入有效的支出金额！');
        return;
    }
    
    // 创建支出记录
    let newExpense = {
        id: Date.now(),
        date: date,
        category: category,
        amount: parseFloat(amount),
        desc: desc,
        createTime: new Date().toLocaleString()
    };
    
    expenses.push(newExpense);
    saveData();
    
    // 清空表单
    document.getElementById('expense_date').value = '';
    document.getElementById('expense_category').value = '';
    document.getElementById('expense_amount').value = '';
    document.getElementById('expense_desc').value = '';
    
    renderExpenseList();
    renderDataCenter();
    
    alert('支出记录添加成功！');
}

// 渲染支出记录列表
function renderExpenseList() {
    let d = document.getElementById('expenseList');
    if(!d) return;
    
    d.innerHTML = '';
    
    if(expenses.length === 0) {
        d.innerHTML = '<p style="color:#888;font-size:14px;">暂无支出记录</p>';
        return;
    }
    
    // 按日期倒序排序
    let sortedExpenses = [...expenses].sort((a, b) => new Date(b.date) - new Date(a.date));
    
    sortedExpenses.forEach(expense => {
        d.innerHTML += `
            <div class="list-item">
                <div class="title">${expense.date} | ${expense.category}</div>
                <div class="info">金额：¥${expense.amount} | 描述：${expense.desc || '无'}<br>添加时间：${expense.createTime}</div>
            </div>
        `;
    });
}

// 导出数据备份
function exportData() {
    let data = {
        customers: customers,
        cards: cards,
        checkins: checkins,
        cancels: cancels,
        employees: packages,
        expenses: expenses,
        exportTime: new Date().toLocaleString()
    };
    
    let json = JSON.stringify(data, null, 2);
    let blob = new Blob([json], {type: 'application/json'});
    let url = URL.createObjectURL(blob);
    let a = document.createElement('a');
    a.href = url;
    a.download = '逸百年康养美容管理系统数据备份_' + new Date().toISOString().slice(0,10) + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    alert('数据备份已导出！');
}

// 导入数据备份
function importData() {
    document.getElementById('importFile').click();
}

// 处理导入文件
function handleImportFile(event) {
    let file = event.target.files[0];
    if(!file) return;
    
    let reader = new FileReader();
    reader.onload = function(e) {
        try {
            let data = JSON.parse(e.target.result);
            
            if(!data.customers || !data.cards || !data.checkins || !data.cancels || (!data.packages && !data.employees)) {
                alert('无效的备份文件！');
                return;
            }
            
            if(confirm('导入数据将覆盖现有数据，确定要继续吗？')) {
                localStorage.setItem('yibainian_customers', JSON.stringify(data.customers));
                localStorage.setItem('yibainian_cards', JSON.stringify(data.cards));
                localStorage.setItem('yibainian_checkins', JSON.stringify(data.checkins));
                localStorage.setItem('yibainian_cancels', JSON.stringify(data.cancels));
                localStorage.setItem('yibainian_employees', JSON.stringify(data.employees || data.packages || []));
                localStorage.setItem('yibainian_expenses', JSON.stringify(data.expenses || []));
                
                customers = data.customers;
                cards = data.cards;
                checkins = data.checkins;
                cancels = data.cancels;
                packages = data.employees || data.packages || [];
                expenses = data.expenses || [];
                
                renderCardList();
                renderCheckinList();
                renderCancelList();
                renderEmployeeList();
                renderExpenseList();
                renderDataCenter();
                
                alert('数据导入成功！\n备份时间：' + (data.exportTime || '未知'));
            }
        } catch(err) {
            alert('文件解析失败，请确保是有效的备份文件！');
        }
    };
    reader.readAsText(file);
    
    event.target.value = '';
}

function renderCancelList() {
    let d = document.getElementById('cancelList'); d.innerHTML = '';
    cancels.forEach(i=>{
        d.innerHTML += `
        <div class="list-item">
            <div class="title">${i.name} | 已销卡</div>
            <div class="info">
                卡类型：${i.cardType || '未指定'} | 原因：${i.reason} | 退款：${i.refund}元<br>
                时间：${i.time}

        </div>`;
    });
}

// 员工
function saveEmployee() {
    let name = document.getElementById('e_name').value.trim();
    let position = document.getElementById('e_position').value.trim();
    let tel = document.getElementById('e_tel').value.trim();
    let remark = document.getElementById('e_remark').value.trim();
    
    if(!name) { alert('请输入员工姓名！'); return; }
    
    let employee = {
        name, position, tel, remark,
        id: Date.now(),
        time: new Date().toLocaleString()
    };
    
    packages.unshift(employee);
    saveData();
    alert('员工保存成功！');
    
    document.getElementById('e_name').value = '';
    document.getElementById('e_position').value = '';
    document.getElementById('e_tel').value = '';
    document.getElementById('e_remark').value = '';
    
    renderEmployeeList();
}

// 渲染员工列表
function renderEmployeeList() {
    let d = document.getElementById('employeeList');
    d.innerHTML = '';
    
    if(packages.length === 0) {
        d.innerHTML = '<div class="list-item">暂无员工信息</div>';
        return;
    }
    
    packages.forEach(emp => {
        d.innerHTML += `
        <div class="list-item">
            <div class="title">${emp.name} | ${emp.position}</div>
            <div class="info">
                电话：${emp.tel || '无'}<br>
                备注：${emp.remark || '无'}<br>
                登记时间：${emp.time}
            </div>
            <div style="margin-top: 8px; display: flex; gap: 5px;">
                <button onclick="editEmployee(${emp.id})" style="flex: 1; padding: 5px; font-size: 12px; background: #4092e8; color: white; border: none; border-radius: 4px;">编辑</button>
                <button onclick="deleteEmployee(${emp.id})" style="flex: 1; padding: 5px; font-size: 12px; background: #e65050; color: white; border: none; border-radius: 4px;">删除</button>
            </div>
        </div>`;
    });
}

// 编辑员工
function editEmployee(id) {
    let emp = packages.find(e => e.id === id);
    if(emp) {
        document.getElementById('e_name').value = emp.name;
        document.getElementById('e_position').value = emp.position;
        document.getElementById('e_tel').value = emp.tel;
        document.getElementById('e_remark').value = emp.remark;
        
        // 替换保存按钮为更新按钮
        let saveBtn = document.querySelector('#employee .btn');
        saveBtn.textContent = '更新员工';
        saveBtn.onclick = function() {
            updateEmployee(id);
        };
    }
}

// 更新员工
function updateEmployee(id) {
    let name = document.getElementById('e_name').value.trim();
    let position = document.getElementById('e_position').value.trim();
    let tel = document.getElementById('e_tel').value.trim();
    let remark = document.getElementById('e_remark').value.trim();
    
    if(!name) { alert('请输入员工姓名！'); return; }
    
    let index = packages.findIndex(e => e.id === id);
    if(index !== -1) {
        packages[index] = {
            ...packages[index],
            name, position, tel, remark
        };
        saveData();
        alert('员工更新成功！');
        
        // 恢复保存按钮
        let saveBtn = document.querySelector('#employee .btn');
        saveBtn.textContent = '保存员工';
        saveBtn.onclick = saveEmployee;
        
        document.getElementById('e_name').value = '';
        document.getElementById('e_position').value = '';
        document.getElementById('e_tel').value = '';
        document.getElementById('e_remark').value = '';
        
        renderEmployeeList();
    }
}

// 删除员工
function deleteEmployee(id) {
    if(confirm('确定要删除该员工吗？')) {
        packages = packages.filter(e => e.id !== id);
        saveData();
        renderEmployeeList();
        alert('员工删除成功！');
    }
}

// 卡类型管理
let cardTypes = JSON.parse(localStorage.getItem('yibainian_cardTypes')) || ['康养卡', '美容卡', '综合卡', '体验卡', '次卡', '季卡', '年卡'];

function openCardTypeSettings() {
    document.getElementById('cardTypeModal').style.display = 'block';
    renderCardTypeList();
}

function closeCardTypeModal() {
    document.getElementById('cardTypeModal').style.display = 'none';
    updateCardTypeSelect();
}

function addCardType() {
    let newType = document.getElementById('new_card_type').value.trim();
    if(!newType) {
        alert('请输入卡类型！');
        return;
    }
    if(cardTypes.includes(newType)) {
        alert('该卡类型已存在！');
        return;
    }
    cardTypes.push(newType);
    localStorage.setItem('yibainian_cardTypes', JSON.stringify(cardTypes));
    document.getElementById('new_card_type').value = '';
    renderCardTypeList();
    updateCardTypeSelect();
    alert('卡类型添加成功！');
}

function deleteCardType(type) {
    if(confirm('确定要删除该卡类型吗？')) {
        cardTypes = cardTypes.filter(t => t !== type);
        localStorage.setItem('yibainian_cardTypes', JSON.stringify(cardTypes));
        renderCardTypeList();
        updateCardTypeSelect();
        alert('卡类型删除成功！');
    }
}

function renderCardTypeList() {
    let container = document.getElementById('cardTypeList');
    container.innerHTML = '';
    cardTypes.forEach(type => {
        container.innerHTML += `
            <div style="background: #f8f9fa; padding: 8px 12px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center;">
                <span>${type}</span>
                <button onclick="deleteCardType('${type}')" style="background: #e65050; color: white; border: none; padding: 4px 8px; border-radius: 3px; cursor: pointer; font-size: 12px;">删除</button>
            </div>
        `;
    });
}

function updateCardTypeSelect() {
    let select = document.getElementById('card_type');
    select.innerHTML = '';
    cardTypes.forEach(type => {
        select.innerHTML += `<option>${type}</option>`;
    });
}

// 登录/注册功能

// 切换登录标签
function switchLoginTab(tab) {
    // 隐藏所有表单
    document.querySelectorAll('.login-form').forEach(form => form.classList.remove('active'));
    document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
    
    // 显示选中的表单
    if(tab === 'login' || tab === 'register') {
        document.getElementById(tab + 'Form').classList.add('active');
        document.getElementById(tab + 'Tab').classList.add('active');
    }
}

// 注册用户
function registerUser() {
    let username = document.getElementById('registerPhone').value.trim();
    let password = document.getElementById('registerPassword').value;
    let confirmPassword = document.getElementById('registerConfirmPassword').value;
    
    if(!username) {
        alert('请输入手机号码或用户名！');
        return;
    }
    
    if(!password || password.length < 6) {
        alert('密码长度至少6位！');
        return;
    }
    
    if(password !== confirmPassword) {
        alert('两次输入的密码不一致！');
        return;
    }
    
    // 检查用户名是否已注册
    if(users.some(user => user.phone === username)) {
        alert('该账号已注册！');
        return;
    }
    
    // 创建新用户
    let newUser = {
        id: Date.now(),
        phone: username,
        password: password, // 实际项目中应该加密存储
        createdAt: new Date().toLocaleString()
    };
    
    users.push(newUser);
    localStorage.setItem('yibainian_users', JSON.stringify(users));
    
    alert('注册成功！请登录');
    switchLoginTab('login');
    
    // 清空表单
    document.getElementById('registerPhone').value = '';
    document.getElementById('registerPassword').value = '';
    document.getElementById('registerConfirmPassword').value = '';
}

// 密码登录
function loginWithPassword() {
    let username = document.getElementById('loginPhone').value.trim();
    let password = document.getElementById('loginPassword').value;
    
    if(!username || !password) {
        alert('请输入账号和密码！');
        return;
    }
    
    // 查找用户
    let user = users.find(u => u.phone === username && u.password === password);
    
    if(!user) {
        alert('账号或密码错误！');
        return;
    }
    
    // 登录成功
    currentUser = user;
    localStorage.setItem('yibainian_currentUser', JSON.stringify(currentUser));
    showMainSystem();
}

// 显示主系统
function showMainSystem() {
    document.getElementById('login').classList.remove('active');
    document.querySelector('.header').style.display = 'block';
    document.querySelector('.menu').style.display = 'flex';
    goPage('home');
}

// 退出登录
function logout() {
    if(confirm('确定要退出登录吗？')) {
        currentUser = null;
        localStorage.removeItem('yibainian_currentUser');
        document.getElementById('login').classList.add('active');
        document.querySelector('.header').style.display = 'none';
        document.querySelector('.menu').style.display = 'none';
        // 隐藏所有页面
        document.querySelectorAll('.page:not(#login)').forEach(page => page.classList.remove('active'));
    }
}

// 页面加载时检查登录状态
window.onload = function() {
    // 初始化Firebase数据
    loadDataFromFirebase();
    setupFirebaseListener();
    
    if(currentUser) {
        showMainSystem();
    }
};
